<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Cyberbullying Filter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            width: 300px;
            background: #f8f9fa;
            color: #212529;
        }

        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
        }

        .header p {
            font-size: 11px;
            opacity: 0.85;
            margin-top: 2px;
        }

        .shield {
            font-size: 28px;
        }

        .status-card {
            margin: 12px;
            background: white;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-label {
            font-size: 13px;
            color: #666;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ccc;
            border-radius: 24px;
            transition: .3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        input:checked+.slider {
            background: #1a73e8;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            padding: 4px 0;
            border-top: 1px solid #f0f0f0;
        }

        .count {
            font-weight: 600;
            color: #e53935;
        }

        .btn {
            display: block;
            width: calc(100% - 24px);
            margin: 0 12px 12px;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: #1557b0;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #aaa;
            padding: 8px;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="shield">🛡️</div>
        <div>
            <h1>Cyberbullying Filter</h1>
            <p>AI-powered comment protection</p>
        </div>
    </div>

    <div class="status-card">
        <div class="status-row">
            <span class="status-label">Protection Active</span>
            <label class="toggle">
                <input type="checkbox" id="toggleFilter" checked />
                <span class="slider"></span>
            </label>
        </div>
        <div class="info-row">
            <span>Comments hidden today</span>
            <span class="count" id="hiddenCount">0</span>
        </div>
        <div class="info-row">
            <span>Current page</span>
            <span id="currentSite">—</span>
        </div>
    </div>

    <button class="btn" id="scanNow">🔍 Scan This Page Now</button>

    <div class="footer">Cyberbullying Detection System v2.0</div>

    <script>
        // Show current site
        chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
            if (tabs[0]) {
                try {
                    const url = new URL(tabs[0].url);
                    document.getElementById("currentSite").textContent = url.hostname;
                } catch { }
            }
        });

        // Load hidden count from storage
        chrome.storage.local.get(["hiddenCount"], (result) => {
            document.getElementById("hiddenCount").textContent = result.hiddenCount || 0;
        });

        // Toggle filter
        document.getElementById("toggleFilter").addEventListener("change", (e) => {
            chrome.storage.local.set({ filterEnabled: e.target.checked });
        });

        // Load toggle state
        chrome.storage.local.get(["filterEnabled"], (result) => {
            const enabled = result.filterEnabled !== false;
            document.getElementById("toggleFilter").checked = enabled;
        });

        // Scan now button
        document.getElementById("scanNow").addEventListener("click", () => {
            chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
                if (tabs[0]) {
                    chrome.scripting.executeScript({
                        target: { tabId: tabs[0].id },
                        func: () => {
                            if (typeof scanPage === "function") scanPage();
                        },
                    });
                }
            });
        });
    </script>

</body>

</html>
