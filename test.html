<!DOCTYPE html>
<html>

<head>
    <title>Instagram Demo</title>

    <style>
        body {
            font-family: Arial;
            background: #fafafa;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            width: 400px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
        }

        .comment {
            display: flex;
            margin-bottom: 12px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .username {
            font-weight: bold;
            margin-right: 5px;
        }

        .text {
            display: inline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h3>Comments</h3>

        <div class="comment">
            <img class="avatar" src="https://i.pravatar.cc/40?img=1">
            <div>
                <span class="username">john</span>
                <span class="text">You are stupid and ugly</span>
            </div>
        </div>

        <div class="comment">
            <img class="avatar" src="https://i.pravatar.cc/40?img=2">
            <div>
                <span class="username">emma</span>
                <span class="text">This is a nice post</span>
            </div>
        </div>

        <div class="comment">
            <img class="avatar" src="https://i.pravatar.cc/40?img=3">
            <div>
                <span class="username">alex</span>
                <span class="text">Nobody likes you</span>
            </div>
        </div>

    </div>

</body>

</html>
